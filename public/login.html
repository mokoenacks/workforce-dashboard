<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workforce Monitor Agent – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@simplewebauthn/browser/dist/simplewebauthn-browser.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 50%, #0a0f0a 0%, #000 90%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    /* Scan lines overlay */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 0, 0.02) 2px,
        rgba(0, 255, 0, 0.02) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* Pulsing monitor dot */
    .monitor-dot {
      position: absolute;
      top: 2rem;
      right: 2rem;
      width: 12px;
      height: 12px;
      background: #00ff41;
      border-radius: 50%;
      box-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41;
      animation: pulse 2s infinite;
      z-index: 2;
    }
    .monitor-dot::after {
      content: "AGENT ACTIVE";
      position: absolute;
      right: 24px;
      top: -2px;
      color: #00ff41;
      font-size: 0.7rem;
      letter-spacing: 2px;
      white-space: nowrap;
      opacity: 0.8;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    /* Login card */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(0, 10, 0, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 255, 0, 0.2);
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0, 255, 0, 0.1);
      z-index: 1;
      padding: 2.5rem;
      position: relative;
    }

    .login-card .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-card .card-header .agent-icon {
      font-size: 3.5rem;
      filter: drop-shadow(0 0 10px #00ff41);
      margin-bottom: 0.5rem;
    }
    .login-card .card-header h2 {
      color: #00ff41;
      font-size: 1.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(0,255,0,0.5);
    }
    .login-card .card-header p {
      color: #b3ffb3;
      font-size: 0.8rem;
      opacity: 0.8;
      margin-top: 0.3rem;
    }

    .btn-google, .btn-fingerprint {
      font-family: 'Share Tech Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1px solid rgba(0, 255, 0, 0.3);
      background: transparent;
      color: #00ff41;
      transition: all 0.3s;
      padding: 0.7rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-google:hover, .btn-fingerprint:hover {
      background: rgba(0, 255, 0, 0.1);
      border-color: #00ff41;
      box-shadow: 0 0 15px rgba(0,255,0,0.3);
      color: #fff;
    }
    .btn-google img {
      width: 20px;
    }

    .footer-text {
      color: #b3ffb3;
      font-size: 0.75rem;
      margin-top: 1.5rem;
      text-align: center;
      opacity: 0.7;
    }
    .footer-text a {
      color: #00ff41;
      text-decoration: none;
      border-bottom: 1px dotted #00ff41;
    }
    .footer-text a:hover {
      color: #fff;
      text-shadow: 0 0 8px #00ff41;
    }
    #errorMsg {
      color: #ff4444;
      text-shadow: 0 0 6px rgba(255,0,0,0.5);
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="monitor-dot"></div>

  <div class="login-card">
    <div class="card-header">
      <div class="agent-icon">🖥️</div>
      <h2>Workforce Monitor</h2>
      <p>Secure access to workforce surveillance logs</p>
    </div>

    <div class="d-grid gap-3">
      <!-- Google Sign In -->
      <a href="/auth/google" class="btn btn-google">
        <img src="https://www.google.com/favicon.ico" width="20" />
        Sign in with Google
      </a>

      <!-- Fingerprint / Passkey Login -->
      <button id="fingerprintBtn" class="btn btn-fingerprint">
        👆 Authenticate via Passkey
      </button>
    </div>

    <p id="errorMsg" class="text-center"></p>

    <div class="footer-text">
      <p>First time? <a href="/settings">Register a hardware token</a></p>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
